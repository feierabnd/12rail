<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>12rail - Schnellste Zugverbindungen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 40px 0; }
    h1 { font-size: 3rem; background: linear-gradient(90deg, #00d4ff, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .search-box { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; backdrop-filter: blur(10px); }
    .search-form { display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; }
    input { padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; font-size: 1rem; }
    input::placeholder { color: #64748b; }
    button { padding: 15px 40px; border-radius: 12px; border: none; background: linear-gradient(90deg, #00d4ff, #7c3aed); color: white; font-weight: 600; cursor: pointer; }
    button:hover { transform: translateY(-2px); }
    .results { margin-top: 30px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
    th { color: #94a3b8; text-transform: uppercase; font-size: 0.85rem; }
    .duration { color: #00d4ff; font-weight: 700; }
    .loading, .no-results { text-align: center; padding: 40px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>🚂 12rail</h1><p>Finde die schnellsten Zugverbindungen in Europa</p></header>
    <div class="search-box">
      <form class="search-form" id="searchForm">
        <input type="text" id="from" placeholder="Von (z.B. Berlin)" required>
        <input type="text" id="to" placeholder="Nach (z.B. Paris)" required>
        <button type="submit">Suchen</button>
      </form>
    </div>
    <div class="results" id="results" style="display:none;">
      <table><thead><tr><th>#</th><th>Verbindung</th><th>Dauer</th><th>Transport</th><th>Abfahrt</th><th>Ankunft</th></tr></thead><tbody id="resultsBody"></tbody></table>
    </div>
    <div class="loading" id="loading" style="display:none;">🔍 Suche...</div>
    <div class="no-results" id="noResults" style="display:none;">Keine Ergebnisse</div>
  </div>
  <script>
    document.getElementById('searchForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const from = document.getElementById('from').value;
      const to = document.getElementById('to').value;
      document.getElementById('results').style.display = 'none';
      document.getElementById('noResults').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      try {
        const res = await fetch(`/api/search?from=${from}&to=${to}`);
        const data = await res.json();
        document.getElementById('loading').style.display = 'none';
        if (data.connections?.length) {
          document.getElementById('resultsBody').innerHTML = data.connections.map(c => `<tr><td>${c.id}</td><td>${c.from} → ${c.to}</td><td class="duration">${c.duration}</td><td>${c.transport}</td><td>${c.departure}</td><td>${c.arrival}</td></tr>`).join('');
          document.getElementById('results').style.display = 'block';
        } else { document.getElementById('noResults').style.display = 'block'; }
      } catch { document.getElementById('loading').style.display = 'none'; document.getElementById('noResults').style.display = 'block'; }
    });
  </script>
</body>
</html>
