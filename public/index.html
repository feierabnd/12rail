<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="12rail">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <title>12rail - Schnellste Zugverbindungen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 40px 0; }
    h1 { font-size: 3rem; background: linear-gradient(90deg, #00d4ff, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .search-box { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; backdrop-filter: blur(10px); }
    .search-form { display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; }
    .input-group { position: relative; }
    input { 
      padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); 
      background: rgba(255,255,255,0.1); color: #fff; font-size: 1rem; width: 100%; 
    }
    input::placeholder { color: #64748b; }
    .suggestions {
      position: absolute; top: 100%; left: 0; right: 0; background: #1a1a2e; 
      border-radius: 12px; margin-top: 5px; max-height: 200px; overflow-y: auto; 
      z-index: 1000; display: none; border: 1px solid rgba(255,255,255,0.2);
    }
    .suggestions.show { display: block; }
    .suggestion { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .suggestion:hover { background: rgba(255,255,255,0.1); }
    .suggestion:last-child { border-bottom: none; }
    button { padding: 15px 40px; border-radius: 12px; border: none; background: linear-gradient(90deg, #00d4ff, #7c3aed); color: white; font-weight: 600; cursor: pointer; }
    button:hover { transform: translateY(-2px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .results { margin-top: 30px; }
    .connection { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin-bottom: 15px; }
    .connection-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .duration { color: #00d4ff; font-weight: 700; font-size: 1.2rem; }
    .transfers { color: #f59e0b; font-size: 0.9rem; }
    .total-delay { color: #ef4444; font-weight: 600; font-size: 0.9rem; }
    .connection.has-delay { border-left: 3px solid #ef4444; }
    .map-btn { padding: 5px 12px; font-size: 0.8rem; background: rgba(124, 58, 237, 0.3); border: 1px solid #7c3aed; }
    .map-btn:hover { background: rgba(124, 58, 237, 0.5); }
    .map-container { height: 300px; margin: 15px 0; border-radius: 10px; overflow: hidden; }
    .segments { border-left: 2px solid #7c3aed; padding-left: 20px; margin-left: 10px; }
    .segment { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .segment:last-child { border-bottom: none; }
    .segment-header { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .transport-badge { background: #7c3aed; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; }
    .time { font-weight: 600; }
    .time.delayed { color: #ef4444; }
    .delay { color: #ef4444; font-size: 0.85rem; font-weight: 700; }
    .station { color: #94a3b8; }
    .arrow { color: #64748b; }
    .platform { color: #64748b; font-size: 0.85rem; }
    .loading, .no-results, .error { text-align: center; padding: 40px; color: #94a3b8; }
    .error { color: #ef4444; }
    .favorites-section { margin-top: 20px; }
    .favorites-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .favorites-title { color: #94a3b8; font-size: 0.9rem; }
    .favorite-btn { background: transparent; border: 1px solid #7c3aed; padding: 8px 15px; font-size: 0.9rem; }
    .favorite-btn:hover { background: #7c3aed; }
    .favorites-list { display: flex; flex-wrap: wrap; gap: 10px; }
    .favorite-chip { background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .favorite-chip:hover { background: rgba(255,255,255,0.2); }
    .favorite-chip .delete { color: #ef4444; margin-left: 5px; }
    .favorite-chip .delete:hover { color: #f87171; }
    @media (max-width: 768px) {
      .search-form { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🚂 12rail</h1>
      <p>Echtzeit-Zugverbindungen in Europa</p>
    </header>
    <div class="search-box">
      <div class="favorites-section" id="favoritesSection" style="display:none;">
        <div class="favorites-header">
          <span class="favorites-title">⭐ Gespeicherte Strecken</span>
        </div>
        <div class="favorites-list" id="favoritesList"></div>
      </div>
      <form class="search-form" id="searchForm">
        <div class="input-group">
          <input type="text" id="from" placeholder="Von (z.B. Berlin, Hamburg Hbf)" autocomplete="off" required>
          <div class="suggestions" id="fromSuggestions"></div>
        </div>
        <div class="input-group">
          <input type="text" id="to" placeholder="Nach (z.B. München, Wien)" autocomplete="off" required>
          <div class="suggestions" id="toSuggestions"></div>
        </div>
        <div class="input-group" style="grid-column: 1 / -1; display: flex; gap: 10px; flex-wrap: wrap;">
          <input type="date" id="date" required>
          <input type="time" id="time" value="00:00">
          <button type="button" id="saveFavoriteBtn" class="favorite-btn" style="display: none;">⭐ Speichern</button>
        </div>
        <button type="submit" id="searchBtn">Suchen</button>
      </form>
    </div>
    <div class="results" id="results" style="display:none;"></div>
    <div class="loading" id="loading" style="display:none;">🔍 Suche Verbindungen...</div>
    <div class="no-results" id="noResults" style="display:none;">Keine Verbindungen gefunden</div>
    <div class="error" id="error" style="display:none;"></div>
  </div>

  <script>
    // Set default date to today
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date').value = today;

    const fromInput = document.getElementById('from');
    const toInput = document.getElementById('to');
    const fromSuggestions = document.getElementById('fromSuggestions');
    const toSuggestions = document.getElementById('toSuggestions');
    let debounceTimer;

    // Station search with debounce
    async function searchStations(query, suggestionsEl) {
      if (query.length < 2) {
        suggestionsEl.classList.remove('show');
        return;
      }
      
      try {
        const res = await fetch(`/api/stations?search=${encodeURIComponent(query)}`);
        const stations = await res.json();
        
        if (stations.length > 0) {
          suggestionsEl.innerHTML = stations.map(s => 
            `<div class="suggestion" data-id="${s.id}" data-name="${s.name}">${s.name}</div>`
          ).join('');
          suggestionsEl.classList.add('show');
        } else {
          suggestionsEl.classList.remove('show');
        }
      } catch (e) {
        suggestionsEl.classList.remove('show');
      }
    }

    // Event listeners for autocomplete
    fromInput.addEventListener('input', (e) => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => searchStations(e.target.value, fromSuggestions), 300);
    });

    toInput.addEventListener('input', (e) => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => searchStations(e.target.value, toSuggestions), 300);
    });

    // Click on suggestion
    [fromSuggestions, toSuggestions].forEach((el, idx) => {
      el.addEventListener('click', (e) => {
        if (e.target.classList.contains('suggestion')) {
          const input = idx === 0 ? fromInput : toInput;
          input.value = e.target.dataset.name;
          el.classList.remove('show');
        }
      });
    });

    // Hide suggestions when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.input-group')) {
        fromSuggestions.classList.remove('show');
        toSuggestions.classList.remove('show');
      }
    });

    // Search form submit
    document.getElementById('searchForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const from = fromInput.value;
      const to = toInput.value;
      const date = document.getElementById('date').value;
      const time = document.getElementById('time').value;
      
      // Enable save button if both fields have values
      const saveBtn = document.getElementById('saveFavoriteBtn');
      if (from && to) {
        saveBtn.style.display = 'inline-block';
        saveBtn.onclick = () => saveFavorite(from, to);
      }
      
      let url = `/api/search?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`;
      if (date) {
        url += `&date=${date}`;
        if (time) url += `&time=${time}`;
      }
      
      document.getElementById('results').style.display = 'none';
      document.getElementById('noResults').style.display = 'none';
      document.getElementById('error').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      
      try {
        const res = await fetch(url);
        const data = await res.json();
        document.getElementById('loading').style.display = 'none';
        
        if (data.error) {
          document.getElementById('error').textContent = data.error;
          document.getElementById('error').style.display = 'block';
          return;
        }
        
        if (data.connections?.length) {
          let html = '';
          data.connections.forEach(conn => {
            // Calculate total delay
            const totalDepartureDelay = conn.segments[0]?.departureDelay || 0;
            const totalArrivalDelay = conn.segments[conn.segments.length - 1]?.arrivalDelay || 0;
            const formatTotalDelay = (mins) => {
              if (mins <= 0) return '';
              if (mins >= 60) {
                const h = Math.floor(mins / 60);
                const m = mins % 60;
                return m > 0 ? `+${h}h ${m}min` : `+${h}h`;
              }
              return `+${mins} min`;
            };
            
            // Collect all coordinates for map
            const allCoords = conn.segments.flatMap(seg => [seg.fromCoords, seg.toCoords]).filter(Boolean);
            
            html += `
              <div class="connection${totalDepartureDelay > 0 || totalArrivalDelay > 0 ? ' has-delay' : ''}" data-coords='${JSON.stringify(allCoords)}'>
                <div class="connection-header">
                  <span class="duration">${conn.totalDuration}</span>
                  ${totalArrivalDelay > 0 ? `<span class="total-delay">${formatTotalDelay(totalArrivalDelay)} Verspätung</span>` : ''}
                  <span class="transfers">${conn.transfers}</span>
                  <button class="map-btn" onclick="toggleMap(this)">🗺️ Karte</button>
                </div>
                <div class="map-container" style="display:none;"></div>
                <div class="segments">
                  ${conn.segments.map(seg => `
                    <div class="segment">
                      <div class="segment-header">
                        <span class="transport-badge">${seg.transport} ${seg.line}</span>
                        <span class="time${seg.departureDelay > 0 ? ' delayed' : ''}">${seg.departure}${seg.departureDelay > 0 ? ` <span class="delay">${seg.departureDelayFormatted}</span>` : ''}</span>
                        <span class="arrow">→</span>
                        <span class="station">${seg.from}</span>
                        <span class="arrow">→</span>
                        <span class="station">${seg.to}</span>
                        <span class="time${seg.arrivalDelay > 0 ? ' delayed' : ''}">${seg.arrival}${seg.arrivalDelay > 0 ? ` <span class="delay">${seg.arrivalDelayFormatted}</span>` : ''}</span>
                        ${seg.platform ? `<span class="platform">Gl. ${seg.platform}</span>` : ''}
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            `;
          });
          document.getElementById('results').innerHTML = html;
          document.getElementById('results').style.display = 'block';
        } else {
          document.getElementById('noResults').style.display = 'block';
        }
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').textContent = 'Fehler: ' + err.message;
        document.getElementById('error').style.display = 'block';
      }
    });

    // Favorites functionality
    const FAVORITES_KEY = '12rail_favorites';
    
    function getFavorites() {
      try {
        return JSON.parse(localStorage.getItem(FAVORITES_KEY)) || [];
      } catch {
        return [];
      }
    }
    
    function saveFavorite(from, to) {
      const favorites = getFavorites();
      const key = `${from}|${to}`;
      
      if (!favorites.find(f => f.key === key)) {
        favorites.push({ key, from, to });
        localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
        renderFavorites();
      }
    }
    
    function deleteFavorite(key) {
      const favorites = getFavorites().filter(f => f.key !== key);
      localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
      renderFavorites();
    }
    
    function renderFavorites() {
      const favorites = getFavorites();
      const section = document.getElementById('favoritesSection');
      const list = document.getElementById('favoritesList');
      
      if (favorites.length === 0) {
        section.style.display = 'none';
        return;
      }
      
      section.style.display = 'block';
      list.innerHTML = favorites.map(f => `
        <div class="favorite-chip" onclick="loadFavorite('${f.from}', '${f.to}')">
          ${f.from} → ${f.to}
          <span class="delete" onclick="event.stopPropagation(); deleteFavorite('${f.key}')">✕</span>
        </div>
      `).join('');
    }
    
    function loadFavorite(from, to) {
      fromInput.value = from;
      toInput.value = to;
    }
    
    // Initialize favorites on page load
    renderFavorites();
    
    // Map toggle function
    function toggleMap(btn) {
      const connection = btn.closest('.connection');
      const mapContainer = connection.querySelector('.map-container');
      
      if (mapContainer.style.display === 'none') {
        mapContainer.style.display = 'block';
        btn.textContent = '🗺️ Ausblenden';
        
        // Get coordinates
        const coords = JSON.parse(connection.dataset.coords || '[]');
        if (coords.length < 2) {
          mapContainer.innerHTML = '<p style="padding:20px;color:#94a3b8;">Keine Koordinaten verfügbar</p>';
          return;
        }
        
        // Create unique map ID
        const mapId = 'map-' + Math.random().toString(36).substr(2, 9);
        mapContainer.innerHTML = `<div id="${mapId}" style="height:100%;width:100%;"></div>`;
        
        // Initialize Leaflet map
        const map = L.map(mapId).setView(coords[0], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap'
        }).addTo(map);
        
        // Draw route line and markers
        const routeLine = coords.map(c => [c[0], c[1]]);
        L.polyline(routeLine, { color: '#7c3aed', weight: 4, opacity: 0.8 }).addTo(map);
        
        // Add markers for start and end
        L.marker(coords[0]).addTo(map).bindPopup('Start');
        L.marker(coords[coords.length - 1]).addTo(map).bindPopup('Ziel');
        
        // Fit bounds to show entire route
        map.fitBounds(routeLine, { padding: [30, 30] });
      } else {
        mapContainer.style.display = 'none';
        btn.textContent = '🗺️ Karte';
      }
    }

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then((reg) => console.log('SW registered:', reg.scope))
        .catch((err) => console.log('SW registration failed:', err));
    }
  </script>
</body>
</html>
